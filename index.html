<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To Be Determined</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <header>
            <div id="step-info">Task <span id="current-step">1</span> of 3</div>
        </header>

        <div id="typing-area">
            <div id="task-title">Initial Calibration</div>
            <div id="target-text">Loading...</div>
            <textarea id="input-field" spellcheck="false" autocomplete="off" autofocus></textarea>
        </div>

        <div id="status-container">
            <p id="save-status">Type to begin.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
