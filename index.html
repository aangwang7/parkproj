<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyDx | Patient Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="container">
        <header>
            <div id="logo">Key<span>Dx</span></div>
            <div id="step-info">Task <span id="current-step">1</span> of 3</div>
        </header>

        <div id="typing-area">
            <div id="task-label">Loading...</div>
            <div id="target-text">Loading...</div>
            <textarea id="input-field" spellcheck="false" autocomplete="off" autofocus placeholder="Begin typing here..."></textarea>
            <div id="status-container">Type to begin.</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
